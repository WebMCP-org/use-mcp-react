name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version or publish
    if: github.repository == vars.RELEASE_REPOSITORY
    runs-on: ubuntu-latest
    environment:
      name: npm-publish
    env:
      NPM_CONFIG_PROVENANCE: "true"
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          node-version: "24"
          cache: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Use npm with trusted publishing support
        run: npm install --global npm@11.14.1

      - name: Check
        run: vp check

      - name: Install Playwright browsers
        run: vp exec playwright install --with-deps chromium

      - name: Test
        run: vp test

      - name: Validate package
        run: vp run validate:package

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          version: vp run changeset:version
          publish: vp run changeset:publish
          title: "ci: version packages"
          commit: "ci: version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
