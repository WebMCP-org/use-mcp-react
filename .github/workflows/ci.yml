name: CI

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify / Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "22"
          - "24"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Check
        run: vp check

      - name: Fallow audit
        run: vp run fallow:audit

      - name: Install Playwright browsers
        run: vp exec playwright install --with-deps chromium

      - name: Test
        run: vp test

      - name: Build library
        run: vp pack

  package:
    name: Package integrity
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          node-version: "24"
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Validate package shape
        run: vp run validate:package

      - name: Verify packed ESM consumer
        run: vp run verify:packed-consumer
