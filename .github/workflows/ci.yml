name: CI

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify / Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "22"
          - "24"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Check
        run: vp check

      - name: Fallow audit
        run: vp run fallow:audit

      - name: Install Playwright browsers
        run: vp exec playwright install --with-deps chromium

      - name: Test
        run: vp test

      - name: Build library
        run: vp pack

  package:
    name: Package integrity
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          node-version: "24"
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Validate package shape
        run: vp run validate:package

      - name: Verify packed ESM consumer
        shell: bash
        run: |
          set -euo pipefail
          TARBALL="$(npm pack --json --ignore-scripts | node -e "let data=''; process.stdin.on('data', c => data += c); process.stdin.on('end', () => console.log(JSON.parse(data)[0].filename));")"
          TMP_DIR="$(mktemp -d)"
          cp "$TARBALL" "$TMP_DIR/package.tgz"
          cd "$TMP_DIR"
          npm init -y
          npm install --ignore-scripts ./package.tgz react@19 @modelcontextprotocol/sdk@1
          node --input-type=module -e "import('use-mcp-react').then((m) => { if (typeof m.useMcp !== 'function') throw new Error('Missing useMcp export'); if (typeof m.McpOAuthCallback !== 'function') throw new Error('Missing McpOAuthCallback export') })"
          cat > index.ts <<'TS'
          import { useMcp, type UseMcpOptions, type UseMcpResult } from "use-mcp-react";

          const options: UseMcpOptions = { enabled: false, storage: false, url: null };
          const hook: (options: UseMcpOptions) => UseMcpResult = useMcp;
          console.log(Boolean(options) && Boolean(hook));
          TS
          npm install --ignore-scripts --save-dev typescript@6
          npx tsc --module nodenext --moduleResolution nodenext --target es2022 --strict --noEmit index.ts
